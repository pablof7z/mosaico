# Copy these hook entries into ~/.codex/config.toml, or into a trusted
# <repo>/.codex/config.toml. tenex-edge must be on PATH (or set TENEX_EDGE_BIN).

[[hooks.SessionStart]]
matcher = "startup|resume"

[[hooks.SessionStart.hooks]]
type = "command"
command = 'tenex-edge hook --host codex --type session-start'
timeout = 30
statusMessage = "Starting tenex-edge"

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = 'tenex-edge hook --host codex --type user-prompt-submit'
timeout = 30
statusMessage = "tenex-edge turn start"

[[hooks.PostToolUse]]

[[hooks.PostToolUse.hooks]]
type = "command"
command = 'tenex-edge hook --host codex --type post-tool-use'
timeout = 10
statusMessage = "tenex-edge turn check"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = 'tenex-edge hook --host codex --type stop'
timeout = 30
statusMessage = "tenex-edge turn end"
